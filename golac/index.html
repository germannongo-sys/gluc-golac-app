<body>
<div id="app"></div>
<script type="text/javascript">










'use strict';
var APP={};window.APP=APP;
var GRADES=['Apprenti','Compagnon','Maitre'];
var TODAY=new Date();
var MFR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
var DEF_OFFS=['VM','1er Surveillant','2ème Surveillant','Secrétaire','Orateur','Expert','Maître de Cérémonie','Hospitalier','Trésorier','Couvreur','Maître de Banquet','Maître Colonne Harmonie','Député','Député Adjoint'];
var LOGO=null;

// ── DROITS PAR DÉFAUT ──
var DEFAULT_PERMS={
  loge:{
    createMembre:{label:'Créer un frère',roles:['VM','Officier']},
    editMembre:{label:'Modifier un frère',roles:['VM','Officier']},
    radierMembre:{label:'Radier un frère',roles:['VM']},
    promouvoir:{label:'Promouvoir un frère',roles:['VM']},
    editCapitations:{label:'Gérer les capitations',roles:['VM','Officier']},
    editAgenda:{label:'Gérer l\'agenda',roles:['VM','Officier']},
    editOfficiers:{label:'Gérer les officiers',roles:['VM']},
    viewFinances:{label:'Voir les finances',roles:['VM']},
    viewRapport:{label:'Voir le rapport',roles:['VM']},
    addVisiteur:{label:'Ajouter un visiteur',roles:['VM','Officier']},
    viewMembres:{label:'Voir les membres',roles:['VM','Officier','Frère']},
  },
  obedience:{
    validateDossier:{label:'Valider les dossiers',roles:['Grand Secrétaire','Grand Maître']},
    validateAffil:{label:'Valider les affiliations',roles:['Grand Secrétaire','Grand Maître']},
    createLoge:{label:'Créer une loge',roles:['Grand Maître']},
    editGrandOff:{label:'Gérer les Grands Officiers',roles:['Grand Maître']},
    viewAdmin:{label:'Administration obédience',roles:['Grand Maître','Grand Secrétaire','Grand Trésorier']},
    manageRights:{label:'Gérer les droits',roles:['Grand Maître']},
    viewAffiliations:{label:'Voir les affiliations',roles:['Grand Maître','Grand Secrétaire']},
  }
};

function mkOffs(){return DEF_OFFS.map(function(t,i){return{id:'off_'+(i+1),titre:t,mid:null,perm:true};});}
function moAt(ds){var d=new Date(ds);return(TODAY.getFullYear()-d.getFullYear())*12+(TODAY.getMonth()-d.getMonth());}
function isPropGrade(m){return m.grade!=='Maitre'&&moAt(m.dateGrade)>=12;}
function isCapOK(m,lid){var c=D.caps.find(function(c){return c.mid===m.id&&c.lid===lid;});if(!c)return false;if(c.st==='Payé')return true;var sd=getSolde(m.id,lid);return sd.solde<=0;}
function nxtG(g){var i=GRADES.indexOf(g);return i<2?GRADES[i+1]:null;}
function gLbl(g){return g==='Maitre'?'Maître':g;}
function tdStr(){return new Date().toISOString().split('T')[0];}
function uid(){return 'i'+Date.now()+Math.random().toString(36).slice(2,5);}
function nxtMat(ms){var ns=ms.map(function(m){var r=m.matricule.match(/\d+/);return r?+r[0]:0;});return'M-'+String(Math.max.apply(null,[0].concat(ns))+1).padStart(3,'0');}
function nxtLNum(ls){return String(Math.max.apply(null,[0].concat(ls.map(function(l){return+l.numero;})))+1).padStart(3,'0');}
function nxtLId(ls){return'L'+String(Math.max.apply(null,[0].concat(ls.map(function(l){return+l.id.replace('L','');})))+1).padStart(3,'0');}
function fmt(n){return Number(n).toLocaleString('fr-FR');}
function sumA(arr,fn){return arr.reduce(function(s,x){return s+(fn?fn(x):x);},0);}
function cleanText(v){return String(v===null||v===undefined?'':v).replace(/[<>]/g,'').replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g,'').trim();}
function sanitizeData(x){
  if(Array.isArray(x)){x.forEach(sanitizeData);return x;}
  if(x&&typeof x==='object'){
    Object.keys(x).forEach(function(k){x[k]=sanitizeData(x[k]);});
    return x;
  }
  return typeof x==='string'?cleanText(x):x;
}

function getAvances(mid,lid){if(!D.avances)D.avances=[];return D.avances.filter(function(a){return a.mid===mid&&a.lid===lid;});}
function getSolde(mid,lid){
  var cap=D.caps.find(function(c){return c.mid===mid&&c.lid===lid;});
  if(!cap)return{du:0,verse:0,solde:0,pct:0};
  var av=getAvances(mid,lid);var verse=sumA(av,function(a){return a.mnt;});
  if(cap.st==='Payé')return{du:cap.mnt,verse:cap.mnt,solde:0,pct:100};
  var solde=Math.max(0,cap.mnt-verse);
  return{du:cap.mnt,verse:verse,solde:solde,pct:Math.min(100,Math.round(verse/cap.mnt*100))};
}

function getAssiduite(mid,lid){
  var loge=gLoge(lid);if(!loge)return{total:0,present:0,pct:0};
  var total=loge.agenda.length;if(!total)return{total:0,present:0,pct:0};
  var pres=(D.presences||[]).filter(function(p){return p.mid===mid&&p.lid===lid&&p.present;}).length;
  return{total:total,present:pres,pct:total?Math.round(pres/total*100):0};
}

// ── PERMISSIONS ──
function hasPerm(permKey,scope){
  var user=S.user;if(!user)return false;
  if(user.role==='Grand Maître')return true;
  var pobj=(scope==='obedience'?DEFAULT_PERMS.obedience:DEFAULT_PERMS.loge)[permKey];
  if(!pobj)return false;
  var roles=D.customPerms&&D.customPerms[scope]&&D.customPerms[scope][permKey]?D.customPerms[scope][permKey]:pobj.roles;
  return roles.indexOf(user.role)!==-1;
}
function isSuperAdmin(){return S.user&&S.user.role==='Super Admin';}
function isGO(){return S.user&&(S.user.role==='Grand Maître'||S.user.role==='Super Admin'||D.grandOff.some(function(g){return g.mid===S.user.id;}));}
function isGS(){return S.user&&(S.user.role==='Grand Maître'||D.grandOff.some(function(g){return g.titre==='Grand Secrétaire'&&g.mid===S.user.id;}));}
function isLO(lid){
  if(!S.user)return false;
  if(isGO()||isSuperAdmin())return true;
  // Check if assigned as any officer in this loge
  var loge=gLoge(lid);if(!loge)return false;
  return loge.officiers.some(function(o){return o.mid===S.user.id;});
}
function isVM(lid){
  if(!S.user)return false;
  if(isGO()||isSuperAdmin())return true;
  var loge=gLoge(lid);if(!loge)return false;
  return loge.officiers.some(function(o){return o.mid===S.user.id&&(o.titre==='VM'||o.titre==='Vénérable Maîtresse');});
}
function _userIsOfficer(u){
  if(!u)return false;
  return D.loges.some(function(l){
    return l.officiers.some(function(o){return o.mid===u.id;});
  });
}
function isFrereSimple(){
  if(!S.user)return false;
  var restrictedRoles=['Frère','Membre'];
  return restrictedRoles.indexOf(S.user.role)!==-1&&S.user.role!=='VM'&&S.user.role!=='Officier';
}
function isMaitre(){return S.user&&S.user.grade==='Maitre';}

// ── DATA ──
function buildData(){
  var o1=mkOffs();o1[0].mid='F001';o1[3].mid='F002';
  var o2=mkOffs();o2[0].mid='F004';o2[8].mid='F005';
  return{
    name:'Grand Orient et Loges Associées du Congo',acronym:'GOLAC',siege:'Brazzaville',fondation:'1995',
    tauxCap:50000,tauxLoge:200000,
    grandOff:[
      {id:'go1',titre:'Grand Maître',mid:'ADM'},{id:'go2',titre:'Grand Secrétaire',mid:'GS1'},
      {id:'go3',titre:'Grand Orateur',mid:null},{id:'go4',titre:'Grand Trésorier',mid:null},
      {id:'go5',titre:'Grand Expert',mid:null},{id:'go6',titre:'Grand Hospitalier',mid:null},
      {id:'go7',titre:'Grand MC',mid:null},{id:'go8',titre:'Grand Couvreur',mid:null},
    ],
    loges:[

var S_PENDING_USER = null; // user awaiting secret question

function checkSecretAnswer(ans){
  var u = S_PENDING_USER; if(!u) return false;
  var grade = u.grade||'Maitre';
  var sq = D.secretQuestions[grade];
  if(!sq) return true; // no question for this grade
  var normalized = ans.toLowerCase().trim().replace(/[àáâ]/g,'a').replace(/[éèêë]/g,'e').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u');
  var variants = sq.variants.concat([sq.a]);
  return variants.some(function(v){
    var nv = v.toLowerCase().trim().replace(/[àáâ]/g,'a').replace(/[éèêë]/g,'e').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u');
    return normalized === nv || normalized.indexOf(nv) !== -1 || nv.indexOf(normalized) !== -1;
  });
}

function canHoldOffice(mid, titre, loge){
  var current = loge.officiers.filter(function(o){return o.mid===mid&&o.id!==titre;});
  if(!current.length) return true;
  // Secrétaire can also be Député or Député Adjoint
  var curTitles = current.map(function(o){return o.titre;});
  var newIsDeputé = titre.indexOf('Député')!==-1;
  var hasSecretaire = curTitles.indexOf('Secrétaire')!==-1;
  if(hasSecretaire && newIsDeputé) return true;
  var newIsSecretaire = titre==='Secrétaire';
  var hasDeputé = curTitles.some(function(t){return t.indexOf('Député')!==-1;});
  if(newIsSecretaire && hasDeputé) return true;
  return false;
}

APP.sendMassNotif=function(){
  var target=G('massTarget').value,canal=G('massCanal').value,msg=G('massMsg').value.trim();
  if(!msg)return;
  var targets=[];
  if(target==='retards')targets=D.caps.filter(function(c){return c.st==='Retard';}).map(function(c){return gMbr(c.mid);}).filter(Boolean);
  else if(target==='attente')targets=D.caps.filter(function(c){return c.st==='En attente';}).map(function(c){return gMbr(c.mid);}).filter(Boolean);
  else if(target==='all')targets=D.membres.filter(function(m){return m.logeId&&m.statut==='actif';});
  else if(target==='nonassidus')targets=D.membres.filter(function(m){if(!m.logeId||m.statut!=='actif')return false;var a=getAssiduite(m.id,m.logeId);return a.pct<50&&a.total>0;});
  targets.forEach(function(m){
    var personalMsg=msg.replace('{nom}',m.nom).replace('{loge}',gLoge(m.logeId)?gLoge(m.logeId).nom:'');
    D.notifLog.push({id:uid(),mid:m.id,canal:canal,msg:personalMsg,date:tdStr(),dest:canal==='email'?(m.email||'—'):(m.tel||'—'),st:'Simulé'});
  });
  alert(targets.length+' notification(s) '+canal+' simulée(s) envoyée(s).\n(Mode démo — configurez API pour envoi réel)');
  APP.closeMod();
};

  notifSchedule.push({id:uid(),date:d,heure:h,target:G('planTarget').value,canal:G('planCanal').value,msg:msg,st:'Planifié'});
  alert('Envoi planifié pour le '+d+' à '+h);APP.closeMod();
};
APP.autoRelanceAll=function(){
  var retards=D.caps.filter(function(c){return c.st==='Retard';});
  var nonAssidus=D.membres.filter(function(m){if(!m.logeId||m.statut!=='actif')return false;var a=getAssiduite(m.id,m.logeId);return a.pct<50&&a.total>0;});
  var total=0;
  retards.forEach(function(c){var m=gMbr(c.mid);if(m){D.notifLog.push({id:uid(),mid:m.id,canal:'email',msg:'Relance automatique : cotisation en retard',date:tdStr(),dest:m.email||'—',st:'Auto'});total++;}});

// Retourne le poste de l'utilisateur courant dans une loge
function getUserPost(lid){
  if(!S.user||!lid)return null;
  var loge=gLoge(lid);if(!loge)return null;
  var off=loge.officiers.find(function(o){return o.mid===S.user.id;});

// Vérifie si l'utilisateur a accès à un onglet donné dans la loge
function canAccessTab(lid, tabId){
  if(isGO()||isSuperAdmin())return true;
  var post=getUserPost(lid);
  if(!post)return false;
  var perms=OFFICER_PERMS[post]||OFFICER_PERMS['default'];
  return perms.indexOf(tabId)!==-1;

  if(isGO()||isSuperAdmin())return 99;
  var post=getUserPost(lid);

  return (OFFICER_ACCESS[post]||{level:1}).level;
}

  if(isGO()||isSuperAdmin())return true;
  var post=getUserPost(lid);

}

function canSeeTresorerie(loge){
  if(!loge)return false;

// PERSISTANCE LOCALSTORAGE — données conservées entre les sessions
// ══════════════════════════════════════════════════════════════════════════
var LS_KEY = 'golac_data';
var LS_LOGO = 'golac_logo';
var LS_LOGE_LOGOS = 'golac_loge_logos';

function saveState() {
  try {
    sanitizeData(D);
    // Save main data (exclude functions)
    var toSave = JSON.parse(JSON.stringify(D));
    localStorage.setItem(LS_KEY, JSON.stringify(toSave));
    if(LOGO) localStorage.setItem(LS_LOGO, LOGO);
    else localStorage.removeItem(LS_LOGO);
    // Save loge logos separately (may be large base64)
    var logeLogos = {};
    D.loges.forEach(function(l){ if(l.logo) logeLogos[l.id]=l.logo; });
    localStorage.setItem(LS_LOGE_LOGOS, JSON.stringify(logeLogos));
  } catch(e) {
    console.warn('LocalStorage save failed:', e.message);
  }
}

function loadState() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if(raw) {
      var parsed = JSON.parse(raw);
      // Deep merge: keep structure from buildData() for new fields
      var fresh = buildData();
      D = Object.assign(fresh, parsed);
      // Restore nested arrays properly
      if(parsed.membres)     D.membres     = parsed.membres;
      if(parsed.loges)       D.loges       = parsed.loges;
      if(parsed.caps)        D.caps        = parsed.caps;
      if(parsed.avances)     D.avances     = parsed.avances;
      if(parsed.versements)  D.versements  = parsed.versements;
      if(parsed.visiteurs)   D.visiteurs   = parsed.visiteurs;
      if(parsed.presences)   D.presences   = parsed.presences;
      if(parsed.dossiersPending)    D.dossiersPending    = parsed.dossiersPending;
      if(parsed.affiliationsPending) D.affiliationsPending = parsed.affiliationsPending;
      if(parsed.radiationPending)   D.radiationPending   = parsed.radiationPending;
      if(parsed.reintegrationPending) D.reintegrationPending = parsed.reintegrationPending;
      if(parsed.notifLog)    D.notifLog    = parsed.notifLog;
      if(parsed.smsLog)      D.smsLog      = parsed.smsLog;
      if(parsed.grandeLogeTenues) D.grandeLogeTenues = parsed.grandeLogeTenues;
      if(parsed.documents)   D.documents   = parsed.documents;
      if(parsed.troncVeuve)  D.troncVeuve  = parsed.troncVeuve;
      if(parsed.obInfo)      D.obInfo      = parsed.obInfo;
      if(parsed.superAdmin)  D.superAdmin  = parsed.superAdmin;
      if(parsed.customPerms) D.customPerms = parsed.customPerms;
      if(parsed.smsConfig)   D.smsConfig   = parsed.smsConfig;
      if(parsed.logoObedience) D.logoObedience = parsed.logoObedience;
      sanitizeData(D);
    }
    // Restore logos
    var savedLogo = localStorage.getItem(LS_LOGO);
    if(savedLogo) LOGO = savedLogo;
    if(D.logoObedience && !LOGO) LOGO = D.logoObedience;
    // Restore loge logos
    var logeLogosRaw = localStorage.getItem(LS_LOGE_LOGOS);
    if(logeLogosRaw) {
      var ll = JSON.parse(logeLogosRaw);
      D.loges.forEach(function(l){ if(ll[l.id]) l.logo = ll[l.id]; });
    }
  } catch(e) {
    console.warn('LocalStorage load failed:', e.message);
    D = buildData();
  }
}

function resetState() {
  if(!confirm('Réinitialiser toutes les données ? Cette action est irréversible.')) return;
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_LOGO);
  localStorage.removeItem(LS_LOGE_LOGOS);
  LOGO = null;
  D = buildData();
  S.user = null; S.view = 'login'; S.lid = null;
  R();
}

  var u=D.membres.find(function(m){return m.matricule===mat&&m.pwd===pwd;});
  if(!u){G('lE').style.display='block';return;}
  G('lE').style.display='none';
  S.user=u;
  // Check if secret question needed
  var grade=u.grade||'Maitre';
  var sq=D.secretQuestions[grade];
  if(sq&&u.role!=='Grand Maître'&&u.role!=='Super Admin'){
    S_PENDING_USER=u;S.user=u;S.view='secretQ';R();return;
  }
  if(u.role==='Grand Maître'||isGO()||isGS()){S.view='obedience';S.tab='programmes';}
  else if(isFrereSimple()){S.view='monEspace';}
  else{S.view='atelierSelect';}
  S.pendingWelcome=true;
  R();
};

function buildProgTable(evts,isInstr){
  if(!evts.length)return'<div style="color:#aaa;font-size:13px;font-style:italic;padding:10px 0">Aucune tenue programmée.</div>';
  var cols=isInstr?'90px 70px 1fr 1fr':'90px 70px 90px 1fr 1fr';
  var byMonth={};
  evts.forEach(function(ev){var d=new Date(ev.date);var k=d.getFullYear()+'-'+String(d.getMonth()).padStart(2,'0');if(!byMonth[k])byMonth[k]={label:MFR[d.getMonth()]+' '+d.getFullYear(),evts:[]};byMonth[k].evts.push(ev);});
  var h='<div style="border:1.5px solid #e5e5e5;border-radius:10px;overflow:hidden;margin-bottom:14px">'
    +'<div style="display:grid;grid-template-columns:'+cols+';background:#111;">'
    +['Date','Heure',!isInstr?'Type':null,'Thème / Planche','Présentateur'].filter(Boolean).map(function(t){return'<div style="padding:8px 11px;font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.4px">'+t+'</div>';}).join('')
    +'</div>';
  Object.keys(byMonth).sort().forEach(function(k){
    var mo=byMonth[k];
    h+='<div style="background:#fff8e1;border-top:1px solid #f0f0f0;padding:7px 13px;font-weight:900;color:#5a3e00;font-size:12px;border-left:4px solid #c9a227;">📅 '+mo.label+'</div>';
    mo.evts.forEach(function(ev){
      var pl=ev.planche?ev.planche:'<span style="color:#bbb;font-style:italic">Non défini</span>';
      var pr=ev.presentateur?ev.presentateur:'<span style="color:#bbb">—</span>';
      var hasCR=(ev.compteRendu&&ev.compteRendu.length>0)||(ev.plancheTracee&&ev.plancheTracee.length>0);
      h+='<div style="display:grid;grid-template-columns:'+cols+(isVM(S.lid)?(' auto'):'')+(hasCR?' auto':'')+(isVM(S.lid)||hasCR?'':'')+';border-top:1px solid #f5f5f5;">'
        +'<div style="padding:9px 11px;font-size:13px;font-weight:700">'+ev.date+'</div>'
        +'<div style="padding:9px 11px;font-size:12px;color:#666">'+ev.heure+'</div>'
        +(!isInstr?'<div style="padding:9px 11px">'+tCh(ev.type||'Tenue')+'</div>':'')
        +'<div style="padding:9px 11px;font-size:13px">'+pl+'</div>'
        +'<div style="padding:9px 11px;font-size:13px">'+pr+'</div>'
        +(hasCR?'<div style="padding:9px 11px"><button class="btn ok sm" onclick="APP.viewPlancheBtn(this)" data-e="'+ev.id+'" data-l="'+S.lid+'">📄 CR<\/button><\/div>':'')
        +'</div>';
    });
  });
  return h+'</div>';
}

function vLoge(){
  var loge=gLoge(S.lid);if(!loge)return hdr()+'<div class="cont">Introuvable.</div>';
  var off=isLO(S.lid),ms=lMbrs(S.lid);
  var props=ms.filter(isPropGrade),caps=lCaps(S.lid),retards=caps.filter(function(c){return c.st==='Retard';});
  var an=props.length+retards.length;
  var tCount=loge.agenda.filter(function(e){return e.type==='Tenue'||e.type==='Cérémonie';}).length;
  var userPost=getUserPost(loge.id);
  var accessLvl=getAccessLevel(loge.id);
  var allTabs=[
    {id:'programme',lbl:'Programme',min:0},
    {id:'instruction',lbl:'Instruction',min:0},
    {id:'membres',lbl:'Membres ('+ms.length+')',min:3},
    {id:'officiers',lbl:'Officiers',min:3},
    {id:'assiduites',lbl:'Assiduité',min:3},
    {id:'visiteurs',lbl:'Visiteurs',min:3},
    {id:'documents',lbl:'Documents',min:2},
    {id:'finances',lbl:'Finances',min:7,offOnly:true},
    {id:'capitations',lbl:'Capitations',min:7,offOnly:true},
    {id:'tronc',lbl:'Tronc Veuve',min:5,offOnly:true},
    {id:'hospitalier',lbl:'Hospitalier',min:5,offOnly:true},
    {id:'alertes',lbl:'Alertes',min:7,badge:an||'',offOnly:true},
    {id:'rapport',lbl:'Rapport',min:10,offOnly:true},
    {id:'paramsLoge',lbl:'⚙ Paramètres',min:10,offOnly:true},
  ];
  var tabs=allTabs.filter(function(t){
    if(isGO()||isSuperAdmin())return true;
    if(t.offOnly&&!off)return false;
    if(!off)return!t.offOnly||false;
    return canAccessTab(loge.id,t.id)||accessLvl>=(t.min||0);
  });
  var bar='<div class="lbar"><div class="lnum">N°'+loge.numero+'</div>'
    +'<div><div style="font-weight:900;font-size:15px">'+loge.nom+'</div>'
    +'<div style="color:#888;font-size:12px">📍 '+loge.ville+' · '+ms.length+' frères · '+ch(tCount+'/3 min.',tCount>=3?'cgreen':'cred')+'</div></div>'
    +'<div style="flex:1"></div>'
    +(off?'<button class="btn outline sm" onclick="APP.openMod(\'newEvt\',{lid:\''+loge.id+'\'})">+ Tenue<\/button>'
       +'<button class="btn ok sm" onclick="APP.openMod(\'affiliationForm\',{lid:\''+loge.id+'\'})">+ Affiliation<\/button>'
       +'<button class="btn gold sm" onclick="APP.openMod(\'dossierForm\',{lid:\''+loge.id+'\'})">+ Nouveau(elle) Membre<\/button>':'')
    +'</div>';
  var c='';
  if(S.tab==='programme')c=lProg(loge,off);
  else if(S.tab==='instruction')c=lInstr(loge,off);
  else if(S.tab==='membres')c=lMbrs2(loge,ms,off);
  else if(S.tab==='officiers')c=lOffs(loge,ms,off);
  else if(S.tab==='capitations')c=lCaps2(loge,caps,off);
  else if(S.tab==='assiduites')c=lAssid(loge,ms);
  else if(S.tab==='visiteurs')c=lVis(loge,off);
  else if(S.tab==='documents')c=tDocuments('loge',loge.id);
  else if(S.tab==='finances'&&off)c=lFin(loge,caps);
  else if(S.tab==='capitations')c=lCaps2(loge,caps,off);
  else if(S.tab==='tronc')c=lTroncVeuve(loge,off);
  else if(S.tab==='alertes'&&off)c=lAlerts(loge,ms,props,retards);
  else if(S.tab==='rapport'&&off)c=lRapport(loge,ms,caps);
  else if(S.tab==='hospitalier')c=lRapportHospitalier(loge);
  else if(S.tab==='paramsLoge'&&off)c=lParams(loge,off);
  var userPost2=getUserPost(loge.id);
  var lvl2=getAccessLevel(loge.id);
  var officerBanner2='';
  if(off&&userPost2&&!isGO()){
    var pColor=lvl2>=10?'#27ae60':lvl2>=7?'#c9a227':lvl2>=5?'#1a5f8a':'#555';
    officerBanner2='<div style="background:#fff;border-bottom:2px solid #e5e5e5;padding:7px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
      +'<div style="background:#111;color:#c9a227;border-radius:6px;padding:4px 11px;font-size:12px;font-weight:900">'+userPost2+'</div>'
      +'<div style="font-size:12px;color:#555">Niveau <strong style="color:'+pColor+'">'+lvl2+'/10</strong></div>'
      +'<div style="flex:1"></div>'
      +'<div style="font-size:11px;color:#888;font-style:italic">Tableau de bord adapté à votre poste</div>'
      +'</div>';
  }
  return hdr()+bar+officerBanner2+tbr(tabs)+'<div class="cont">'+c+'</div>'+modH();
}

    +'<th>Matricule</th><th>Nom</th><th>Grade</th><th>Durée</th><th>Assiduité</th><th>Situation</th><th>Rôle</th>'
    +(off?'<th>Actions</th>':'')+'</tr></thead><tbody>';

    var mo=moAt(m.dateGrade),propG=isPropGrade(m),capOK=isCapOK(m,loge.id);
    var ass=getAssiduite(m.id,loge.id);

APP.soumettreDossier=function(lid){
  var nom=G('mNom').value.trim();if(!nom)return;
  var docs={extrait:G('docEx')&&G('docEx').checked,casier:G('docCas')&&G('docCas').checked,nationalite:G('docNat')&&G('docNat').checked};
  var allOK=docs.extrait&&docs.casier&&docs.nationalite;
  D.dossiersPending.push({id:uid(),lid:lid,nom:nom,tel:G('mTel')?G('mTel').value.trim():'',email:G('mEmail')?G('mEmail').value.trim():'',grade:G('mGradeInit')?G('mGradeInit').value:'Apprenti',genre:G('mGenre')?G('mGenre').value:'M',docs:docs,note:G('mNote')?G('mNote').value.trim():'',date:tdStr(),st:allOK?'Complet':'Incomplet'});
  alert('Dossier soumis à l\'Obédience. Le Grand Secrétaire sera notifié.');APP.closeMod();
};
APP.updateDossier=function(id){
  var dos=D.dossiersPending.find(function(x){return x.id===id;});if(!dos)return;
  dos.docs={extrait:G('docEx')&&G('docEx').checked,casier:G('docCas')&&G('docCas').checked,nationalite:G('docNat')&&G('docNat').checked};
  dos.note=G('mNote')?G('mNote').value.trim():'';
  dos.st=(dos.docs.extrait&&dos.docs.casier&&dos.docs.nationalite)?'Complet':'Incomplet';
  APP.closeMod();
};
APP.validerDossier=function(id){
  var dos=D.dossiersPending.find(function(x){return x.id===id;});if(!dos)return;
  if(!dos.docs.extrait||!dos.docs.casier||!dos.docs.nationalite){alert('Dossier incomplet.');return;}
  var mat=nxtMat(D.membres);var mid=uid();
  var genreDos=dos.genre||'M';D.membres.push({id:mid,matricule:mat,nom:dos.nom,grade:dos.grade||'Apprenti',dateGrade:tdStr(),logeId:dos.lid,role:genreDos==='F'?'Membre':'Membre',pwd:'1234',statut:'actif',tel:dos.tel,email:dos.email,affiliation:null,genre:genreDos});
  D.caps.push({id:uid(),mid:mid,lid:dos.lid,annee:2026,mnt:D.tauxCap,st:'En attente',date:null});
  dos.st='Validé';
  D.dossiersPending=D.dossiersPending.filter(function(x){return x.id!==id;});
  var l=gLoge(dos.lid);
  alert('Membre créé(e) avec succès : '+dos.nom+' ('+mat+') dans la loge '+(l?l.nom:'')+'. MDP par défaut : 1234');
  R();
};
APP.rejeterDossier=function(id){if(!confirm('Rejeter ce dossier ?'))return;D.dossiersPending=D.dossiersPending.filter(function(x){return x.id!==id;});R();};

  var nom=G('mNom').value.trim();if(!nom)return;
  D.affiliationsPending.push({id:uid(),lid:lid,nom:nom,tel:G('mTel')?G('mTel').value.trim():'',email:G('mEmail')?G('mEmail').value.trim():'',grade:G('mGrade').value,genre:G('mGenreAff')?G('mGenreAff').value:'M',logeOrigin:G('mLogeOrig')?G('mLogeOrig').value.trim():'',obOrigin:G('mObOrig')?G('mObOrig').value.trim():'',dateAffil:G('mDateAffil')?G('mDateAffil').value:tdStr(),st:'En attente',note:''});
  alert('Demande d\'affiliation transmise au Grand Secrétaire.');APP.closeMod();
};
APP.validerAffil=function(id){
  var a=D.affiliationsPending.find(function(x){return x.id===id;});if(!a)return;
  var mat=nxtMat(D.membres);var mid=uid();
  var genreAff=a.genre||'M';D.membres.push({id:mid,matricule:mat,nom:a.nom,grade:a.grade,dateGrade:tdStr(),logeId:a.lid,role:'Membre',pwd:'1234',statut:'actif',tel:a.tel,email:a.email,affiliation:{logeOrigin:a.logeOrigin,obOrigin:a.obOrigin,dateAffil:a.dateAffil,st:'Confirmé'},genre:genreAff});
  // Split capitation: half to each loge
  var halfCap=Math.round(D.tauxCap/2);
  D.caps.push({id:uid(),mid:mid,lid:a.lid,annee:2026,mnt:halfCap,st:'En attente',date:null,note:'Capitation affilié (50%)'});
  // Find original loge if member already has one
  var origMbr=D.membres.find(function(x){return x.nom===a.nom&&x.logeId!==a.lid;});
  if(origMbr){
    var origCap=D.caps.find(function(c){return c.mid===origMbr.id;});
    if(origCap)origCap.mnt=halfCap,origCap.note='Capitation affilié (50%)';
  }
  a.st='Confirmé';
  D.affiliationsPending=D.affiliationsPending.filter(function(x){return x.id!==id;});
  alert('Affiliation validée. Frère '+a.nom+' créé ('+mat+'). MDP : 1234');R();
};

APP.radier=function(mid){

APP.createEvt=function(lid){var t=G('mTitre').value.trim(),d=G('mDate').value;if(!t||!d)return;var loge=gLoge(lid);if(!loge)return;loge.agenda.push({id:uid(),titre:t,date:d,heure:G('mHeure')?G('mHeure').value:'',type:G('mType')?G('mType').value:'Tenue',planche:G('mPlanche')?G('mPlanche').value.trim():'',presentateur:G('mPres')?G('mPres').value.trim():''});APP.closeMod();};
APP.createInstr=function(lid){var d=G('mDate').value;if(!d)return;var loge=gLoge(lid);if(!loge)return;if(!loge.instruction)loge.instruction=[];loge.instruction.push({id:uid(),titre:G('mTitre')?G('mTitre').value.trim()||"Tenue d'instruction":'',date:d,heure:G('mHeure')?G('mHeure').value:'',planche:G('mPlanche')?G('mPlanche').value.trim():'',presentateur:G('mPres')?G('mPres').value.trim():''});APP.closeMod();};
APP.createVis=function(lid){var nom=G('mNom').value.trim(),loge=G('mLoge').value.trim();if(!nom||!loge)return;D.visiteurs.push({id:uid(),lid:lid,nom:nom,loge:loge,grade:G('mGrade').value,motif:G('mMotif').value.trim(),date:G('mDate').value});APP.closeMod();};
APP.createOff=function(lid){var t=G('mTitre').value.trim();if(!t)return;var loge=gLoge(lid);if(!loge)return;loge.officiers.push({id:uid(),titre:t,mid:null,perm:false});APP.closeMod();};
APP.doAssignOff=function(lid,oid){
  var sel=G('mSel');if(!sel||!sel.value)return;
  var loge=gLoge(lid);if(!loge)return;
  var o=loge.officiers.find(function(x){return x.id===oid;});if(!o)return;
  // Cumul check
  if(!canHoldOffice(sel.value,o.titre,loge)){
    alert('Ce(tte) membre occupe déjà un poste dans cette loge. Un frère ne peut pas occuper deux fonctions simultanément (sauf Secrétaire + Député/Député Adjoint).');return;
  }
  o.mid=sel.value;
  var mOff=gMbr(sel.value);
  if(mOff){
    mOff.role=o.titre;
    if(S.user&&S.user.id===mOff.id){S.user.role=o.titre;}
  }
  APP.closeMod();
  var dashOff=getOfficerDashboard(lid);
  if(dashOff&&mOff){
    var postMsgOff='Membre '+mOff.nom+' nomme au poste '+o.titre+'. Acces mis a jour.';
    setTimeout(function(){alert(postMsgOff);},100);
  }
};
APP.revokeOff=function(lid,oid){
  var loge=gLoge(lid);if(!loge)return;
  var o=loge.officiers.find(function(x){return x.id===oid;});if(!o)return;
  var m=o.mid?gMbr(o.mid):null;
  o.mid=null;
  if(m){
    // Check if still officer elsewhere in this loge
    var stillOfficer=loge.officiers.some(function(x){return x.mid===m.id;});
    if(!stillOfficer){
      m.role='Membre';
      if(S.user&&S.user.id===m.id){S.user.role='Membre';}
    }
  }
  R();
};

APP.createLoge=function(){
  var nom=G('mNom').value.trim(),ville=G('mVille').value.trim();if(!nom||!ville)return;
  var email=G('mLogeEmail')?G('mLogeEmail').value.trim():'';
  var id=nxtLId(D.loges),num=nxtLNum(D.loges);
  D.loges.push({id:id,numero:num,nom:nom,ville:ville,email:email,statut:'active',agenda:[],instruction:[],officiers:mkOffs(),logo:null});
  D.versements.push({id:uid(),lid:id,annee:2026,mnt:D.tauxLoge,st:'En attente',date:null,desc:'Capitation annuelle 2026'});
  // Fondateurs = Maîtres par défaut
  var fText=G('mFondateurs')?G('mFondateurs').value.trim():'';
  if(fText){
    fText.split('\n').forEach(function(n){
      n=n.trim();if(!n)return;
      var mid=uid(),mat=nxtMat(D.membres);
      D.membres.push({id:mid,matricule:mat,nom:n,grade:'Maitre',dateGrade:tdStr(),logeId:id,role:'Frère',pwd:'1234',statut:'actif',tel:'',email:'',affiliation:null});
      D.caps.push({id:uid(),mid:mid,lid:id,annee:2026,mnt:D.tauxCap,st:'En attente',date:null});
    });
  }
  APP.closeMod();
};

APP.sauvegarderPresences=function(lid){
  var evtId=G('presEvt')?G('presEvt').value:'';if(!evtId){alert('Choisissez une tenue.');return;}
  var ms=lMbrs(lid);
  ms.forEach(function(m){
    var existing=D.presences.find(function(p){return p.mid===m.id&&p.evtId===evtId;});
    var checked=G('pres_'+m.id)&&G('pres_'+m.id).checked;
    if(existing)existing.present=checked;
    else D.presences.push({id:uid(),mid:m.id,lid:lid,evtId:evtId,present:checked});
  });
  APP.closeMod();
};
APP.togglePerm=function(scope,key,role,btn){
  if(!D.customPerms)D.customPerms={loge:{},obedience:{}};
  if(!D.customPerms[scope])D.customPerms[scope]={};
  var def=(scope==='obedience'?DEFAULT_PERMS.obedience:DEFAULT_PERMS.loge)[key];
  var cur=D.customPerms[scope][key]?D.customPerms[scope][key]:[].concat(def.roles);
  var idx=cur.indexOf(role);
  if(idx===-1)cur.push(role);else cur.splice(idx,1);
  D.customPerms[scope][key]=cur;
  btn.classList.toggle('on');
  var row=btn.closest('.perm-row');
  if(row){var info=row.querySelector('div div:last-child');if(info)info.textContent='Rôles actuels : '+cur.join(', ');}
};

function csvE(v){var s=String(v===null||v===undefined?'':v);return'"'+s.replace(/"/g,'""')+'"';}
APP.exportCapsExcel=function(lid){
  var loge=gLoge(lid);if(!loge)return;
  var caps=lCaps(lid);
  var rows=[['Frère','Matricule','Grade','Montant dû','Versé','Solde','Statut','Date paiement']];
  caps.forEach(function(c){var m=gMbr(c.mid),sd=getSolde(c.mid,c.lid);rows.push([m?m.nom:'—',m?m.matricule:'—',m?gLbl(m.grade):'—',c.mnt,sd.verse,sd.solde,c.st,c.date||'']);});
  var csv=rows.map(function(r){return r.map(csvE).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='Capitations_'+loge.nom.replace(/[^a-zA-Z0-9]/g,'_')+'_'+tdStr()+'.csv';a.click();URL.revokeObjectURL(a.href);
};

APP.exportRapportExcel=function(lid){
  var loge=gLoge(lid);if(!loge)return;
  var ms=lMbrs(lid),caps=lCaps(lid);
  var rows=[['RAPPORT ACTIVITÉ — Loge N°'+loge.numero+' '+loge.nom+' — GOLAC — '+tdStr()],['']];
  rows.push(['=== FRÈRES ==='],['Matricule','Nom','Grade','Durée (mois)','Assiduité %','Rôle']);
  ms.forEach(function(m){var ass=getAssiduite(m.id,lid);rows.push([m.matricule,m.nom,gLbl(m.grade),moAt(m.dateGrade),ass.pct+'%',m.role]);});
  rows.push([''],['=== CAPITATIONS ==='],['Frère','Matricule','Dû','Versé','Solde','Statut']);
  caps.forEach(function(c){var m=gMbr(c.mid),sd=getSolde(c.mid,c.lid);rows.push([m?m.nom:'—',m?m.matricule:'—',c.mnt,sd.verse,sd.solde,c.st]);});
  rows.push([''],['=== PROGRAMME ==='],['Date','Heure','Type','Thème','Présentateur']);
  loge.agenda.slice().sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(ev){rows.push([ev.date,ev.heure,ev.type,ev.planche||'',ev.presentateur||'']);});
  rows.push([''],['=== ASSIDUITÉ ==='],['Matricule','Nom'].concat(loge.agenda.map(function(e){return e.date;})).concat(['Total','Taux%']));
  ms.forEach(function(m){var ass=getAssiduite(m.id,lid);var row=[m.matricule,m.nom];loge.agenda.forEach(function(ev){var p=D.presences.find(function(pr){return pr.mid===m.id&&pr.evtId===ev.id;});row.push(p?(p.present?'P':'A'):'—');});row.push(ass.present+'/'+ass.total,ass.pct+'%');rows.push(row);});
  var csv=rows.map(function(r){return(Array.isArray(r)?r:[r]).map(csvE).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='Rapport_'+loge.nom.replace(/[^a-zA-Z0-9]/g,'_')+'_'+tdStr()+'.csv';a.click();URL.revokeObjectURL(a.href);
};
